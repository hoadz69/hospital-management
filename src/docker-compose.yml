name: clinic-saas-local

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_saas_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - clinic_postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - clinic_mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  kafka:
    image: bitnami/kafka:3.7
    profiles:
      - event-bus
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - clinic_kafka_data:/bitnami/kafka

volumes:
  clinic_postgres_data:
  clinic_mongo_data:
  clinic_kafka_data:
