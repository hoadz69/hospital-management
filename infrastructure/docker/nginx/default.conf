# Clinic SaaS reverse proxy scaffold - dev/staging placeholder.
# Phase 4 deployment phải override hostname/SSL/upstream/rate limit thật. File
# này chỉ giữ pattern SPA fallback + forward header chuẩn cho devbuild/smoke.

server {
  listen 80;
  server_name _;

  # SPA fallback: serve frontend build (Vue Router history mode) khi route
  # không khớp asset thật. Phase 4 deployment sẽ trỏ root sang volume publish
  # frontend; ở scaffold này chỉ giữ pattern, không bind path thật.
  root /usr/share/nginx/html;
  index index.html;

  # Forward header chuẩn cho upstream backend.
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;

  # Health endpoint cho LB/uptime check, không log.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # API forward: trỏ tới api-gateway upstream. Dùng Docker embedded DNS
  # (`127.0.0.11`) cộng với biến `$api_upstream` để defer DNS resolution sang
  # request-time, giúp nginx vẫn start được khi compose.prod chưa join
  # `api-gateway` vào network. Phase 4 deployment sẽ thay bằng upstream block
  # thật (load balancing, keepalive, SSL terminate ở Traefik phía trên).
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $api_upstream "api-gateway:8080";
  # `rewrite` cắt prefix `/api` trước khi forward (vd `/api/tenants` ->
  # `/tenants`). Cần vì khi `proxy_pass` chứa biến, nginx không tự rewrite
  # URI theo trailing slash.
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$api_upstream;
  }

  # Cache aggressive cho static asset có hash trong tên (Vite build output).
  # Asset bị invalidate tự nhiên khi hash đổi nên giữ TTL dài an toàn.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 7d;
    add_header Cache-Control "public, no-transform";
  }

  # SPA fallback: route không khớp file thật rơi về index.html để Vue Router
  # xử lý client-side. Asset có hash sẽ được serve trực tiếp qua try_files.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
